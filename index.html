<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tena Sports</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050b18;
color:white;
}

header{
background:linear-gradient(90deg,#111827,#1e293b);
padding:20px;
text-align:center;
font-size:32px;
font-weight:bold;
box-shadow:0 5px 20px rgba(0,0,0,0.5);
}

.menu{
display:flex;
overflow-x:auto;
gap:10px;
padding:15px;
background:#0f172a;
}

.menu button{
background:#1e293b;
border:none;
padding:12px 18px;
color:white;
border-radius:30px;
font-weight:bold;
cursor:pointer;
min-width:100px;
}

.menu button:hover{
background:#2563eb;
}

.container{
padding:20px;
}

.card{
background:#111827;
padding:20px;
margin-bottom:20px;
border-radius:20px;
box-shadow:0 8px 25px rgba(0,0,0,0.4);
}

.live{
color:#00ff88;
font-weight:bold;
margin-bottom:15px;
font-size:15px;
}

.teams{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
font-size:22px;
font-weight:bold;
}

.team{
display:flex;
align-items:center;
gap:10px;
}

.score{
text-align:center;
font-size:30px;
font-weight:bold;
margin:15px 0;
color:#3b82f6;
}

.info{
text-align:center;
color:#9ca3af;
font-size:14px;
}
</style>

</head>
<body>

<header>
⚽ TENA SPORTS
</header>

<div class="menu">
<button>⚽ Fútbol</button>
<button>🥊 MMA</button>
<button>🎾 Tennis</button>
<button>🏐 Voley</button>
<button>🎤 Freestyle</button>
</div>

<div class="container">

<div class="card">
<div class="live">🔴 EN VIVO</div>
<div class="teams">
<div class="team">⚪ Real Madrid</div>
<div class="team">🔵 Barcelona</div>
</div>
<div class="score">2 - 1</div>
<div class="info">Minuto 78</div>
</div>

<div class="card">
<div class="live">🔴 EN VIVO</div>
<div class="teams">
<div class="team">🎾 Djokovic</div>
<div class="team">🎾 Nadal</div>
</div>
<div class="score">1 - 0</div>
<div class="info">Segundo Set</div>
</div>

<div class="card">
<div class="live">🔴 EN VIVO</div>
<div class="teams">

<div class="team">🥊 Diaz</div>
</div>
