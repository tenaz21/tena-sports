<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TENA SPORTS</title>

<style>
body{
margin:0;
background:#021427;
font-family:Arial;
color:white;
}
.header{
background:linear-gradient(90deg,#004cff,#39a9ff);
padding:25px;
font-size:32px;
font-weight:bold;
text-align:center;
}
.banner{
background:red;
padding:20px;
font-size:24px;
font-weight:bold;
}
#matches{
padding:20px;
}
.card{
background:#26478d;
padding:20px;
margin-bottom:15px;
border-radius:15px;
}
.score{
font-size:40px;
font-weight:bold;
margin-top:10px;
}
</style>
</head>
<body>

<div class="header">⚽ TENA SPORTS</div>
<div class="banner">🔥 HOY: Resultados deportivos EN VIVO</div>

<div id="matches">
Cargando partidos...
</div>

<script>

const API_TOKEN="33383a1b11c24b09b892548b771985b4";

async function cargarPartidos(){

try{

const proxy="https://corsproxy.io/?";

const res=await fetch(
proxy+encodeURIComponent("https://api.football-data.org/v4/matches"),
{
headers:{
"X-Auth-Token":API_TOKEN
}
}
);

const data=await res.json();

let html="";

data.matches.slice(0,10).forEach(p=>{

html+=`
<div style="
background:#26478d;
margin:15px;
padding:20px;
border-radius:15px;
">

<h2>${p.homeTeam.name}</h2>
<h2>${p.awayTeam.name}</h2>

<h1>
${p.score.fullTime.home ?? "-"}
-
${p.score.fullTime.away ?? "-"}
</h1>

<p>${p.status}</p>

</div>
`;

});

document.getElementById("matches").innerHTML=html;

}catch(e){

document.getElementById("matches").innerHTML=
"<h2 style='color:red'>"+e+"</h2>";

}

}

cargarPartidos();

</script>

</body>
</html>
