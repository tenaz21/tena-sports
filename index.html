<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TENA SPORTS</title>

<style>
body{
margin:0;
background:#021427;
font-family:Arial;
color:white;
}
.header{
background:linear-gradient(90deg,#0055ff,#39a9ff);
padding:25px;
font-size:32px;
font-weight:bold;
text-align:center;
}
.section{
padding:20px;
font-size:28px;
font-weight:bold;
}
.card{
background:#2e4f9e;
margin:15px;
padding:20px;
border-radius:20px;
}
.score{
font-size:35px;
font-weight:bold;
margin:10px 0;
}
</style>
</head>
<body>

<div class="header">⚽ TENA SPORTS</div>

<div id="app"></div>

<script>

async function cargarTodo(){

let html="";

/* EN VIVO */
html += "<div class='section'>🔴 EN VIVO</div>";

try{

const liveRes = await fetch(
"https://www.thesportsdb.com/api/v1/json/3/livescore.php?s=Soccer"
);

const liveData = await liveRes.json();

if(liveData.events){

liveData.events.forEach(p=>{

html += `
<div class="card">
<h2>${p.strHomeTeam}</h2>
<h2>${p.strAwayTeam}</h2>
<div class="score">
${p.intHomeScore ?? 0} - ${p.intAwayScore ?? 0}
</div>
</div>
`;

});

}else{

html += "<div class='card'>No hay partidos en vivo.</div>";

}

}catch{

html += "<div class='card'>No disponible.</div>";

}


/* PROXIMOS */
html += "<div class='section'>📅 PRÓXIMOS</div>";

try{

const nextRes = await fetch(
"https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id=4328"
);

const nextData = await nextRes.json();

nextData.events.slice(0,5).forEach(p=>{

html += `
<div class="card">
<h2>${p.strHomeTeam}</h2>
<h2>${p.strAwayTeam}</h2>
<div class="score">VS</div>
<p>${p.dateEvent}</p>
</div>
`;

});

}catch{}


/* FINALIZADOS */
html += "<div class='section'>✅ FINALIZADOS</div>";

try{

const finRes = await fetch(
"https://www.thesportsdb.com/api/v1/json/3/eventslastleague.php?id=4328"
);

const finData = await finRes.json();

finData.events.slice(0,5).forEach(p=>{

html += `
<div class="card">
<h2>${p.strHomeTeam}</h2>
<h2>${p.strAwayTeam}</h2>
<div class="score">
${p.intHomeScore} - ${p.intAwayScore}
</div>
</div>
`;

});

}catch{}

document.getElementById("app").innerHTML=html;

}

cargarTodo();

setInterval(cargarTodo,30000);

</script>

</body>
</html>
