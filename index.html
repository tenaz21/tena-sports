<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TENA SPORTS</title>

<style>
body{
margin:0;
font-family:Arial;
background:#021427;
color:white;
padding-bottom:100px;
}
.header{
background:linear-gradient(90deg,#004cff,#39a9ff);
padding:25px;
font-size:32px;
font-weight:bold;
text-align:center;
}
.banner{
background:red;
padding:20px;
font-size:24px;
font-weight:bold;
}
.card{
background:#26478d;
margin:15px;
padding:20px;
border-radius:20px;
}
.liga{
background:#19386b;
padding:15px;
font-size:22px;
font-weight:bold;
}
.score{
font-size:55px;
font-weight:bold;
margin:20px 0;
}
.bottomnav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#00152d;
}
.navbtn{
flex:1;
padding:20px;
text-align:center;
font-weight:bold;
cursor:pointer;
}
.active{
color:#00bfff;
}
</style>

</head>
<body>

<div class="header">⚽ TENA SPORTS</div>

<div class="banner" id="banner">
🔥 HOY: Resultados deportivos EN VIVO
</div>

<div id="matches">
<h2 style="padding:20px;">Cargando partidos...</h2>
</div>

<div class="bottomnav">
<div class="navbtn active" onclick="mostrarLive(this)">🔴<br>En Vivo</div>
<div class="navbtn" onclick="mostrarNext(this)">📅<br>Próximos</div>
<div class="navbtn" onclick="mostrarFinished(this)">✅<br>Finalizados</div>
</div>

<script>

const API_KEY="46146fa668msh7fabe31efaaf8dep198920jsn3151b4847140";

let partidos=[];

function activar(btn){
document.querySelectorAll(".navbtn").forEach(x=>x.classList.remove("active"));
btn.classList.add("active");
}

async function cargarPartidos(){

try{

document.getElementById("matches").innerHTML=
"<h2 style='padding:20px'>Cargando partidos...</h2>";

const fecha=new Date().toISOString().split("T")[0];

const res=await fetch(
`https://livescore67.p.rapidapi.com/api/livescore/v1/match/list?sport_id=football&date=${fecha}`,
{
headers:{
"x-rapidapi-key":API_KEY,
"x-rapidapi-host":"livescore67.p.rapidapi.com"
}
}
);

const data=await res.json();

console.log(data);

if(data.data){

partidos=data.data;

}else if(Array.isArray(data)){

partidos=data;

}else{

throw "La API no devolvió partidos válidos.";

}

mostrarLive();

}catch(err){

document.getElementById("matches").innerHTML=
`
<h2 style="padding:20px;color:red;">
ERROR CARGANDO API:
</h2>

<pre style="padding:20px;color:yellow;">
${err}
</pre>
`;

}

}

function render(tipo){

let html="";

let encontrados=0;

partidos.forEach(liga=>{

if(!liga.matches)return;

let bloque="";

liga.matches.forEach(p=>{

let vivo=p.match_status?.live===1;
let finalizado=p.match_status?.finished===1;

if(tipo==="live"&&!vivo)return;
if(tipo==="next"&&(vivo||finalizado))return;
if(tipo==="finished"&&!finalizado)return;

encontrados++;

bloque+=`

<div class="card">

<h2>
${
tipo==="live"
?"🔴 EN VIVO"
:tipo==="next"
?"📅 PRÓXIMO"
:"✅ FINALIZADO"
}
</h2>

<br>

<div>${p.team_home?.[0]?.team_name||"-"}</div>
<div>${p.team_away?.[0]?.team_name||"-"}</div>

<div class="score">
${p.scores?.home??"-"} - ${p.scores?.away??"-"}
</div>

<div>
⏱ ${
vivo
?p.match_status?.live_time||"En juego"
:new Date(p.match_date).toLocaleString("es-PE",{
timeZone:"America/Lima"
})
}
</div>

</div>
`;

});

if(bloque){

html+=`
<div class="liga">
🏆 ${liga.stage?.stage_name||"Liga"}
</div>

${bloque}
`;

}

});

if(encontrados===0){

html="<h2 style='padding:20px'>No hay partidos disponibles</h2>";

}

document.getElementById("matches").innerHTML=html;

}

function mostrarLive(btn){

if(btn)activar(btn);

document.getElementById("banner").innerHTML=
"🔥 HOY: Resultados deportivos EN VIVO";

render("live");

}

function mostrarNext(btn){

if(btn)activar(btn);

document.getElementById("banner").innerHTML=
"📅 Próximos partidos";

render("next");

}

function mostrarFinished(btn){

if(btn)activar(btn);

document.getElementById("banner").innerHTML=
"✅ Partidos Finalizados";

render("finished");

}

cargarPartidos();

</script>

</body>
</html>
