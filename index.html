<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TENA SPORTS</title>

<style>
body{
margin:0;
background:#021427;
font-family:Arial;
color:white;
padding-bottom:90px;
}

.header{
background:linear-gradient(90deg,#005eff,#42b3ff);
padding:25px;
font-size:32px;
font-weight:bold;
text-align:center;
}

.banner{
background:red;
padding:20px;
font-size:24px;
font-weight:bold;
}

#matches{
padding:15px;
}

.card{
background:#26478d;
padding:20px;
margin-bottom:20px;
border-radius:20px;
cursor:pointer;
}

.team{
display:flex;
align-items:center;
gap:10px;
font-size:22px;
font-weight:bold;
margin:10px 0;
}

.team img{
width:35px;
}

.score{
font-size:42px;
font-weight:bold;
color:#00ff88;
margin:15px 0;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#00172d;
display:flex;
justify-content:space-around;
padding:15px;
font-weight:bold;
}

.bottom-nav div{
cursor:pointer;
}
</style>
</head>
<body>

<div class="header">⚽ TENA SPORTS</div>
<div class="banner">🔥 Resultados deportivos EN VIVO</div>

<div id="matches">Cargando...</div>

<div class="bottom-nav">
<div onclick="cargarEnVivo()">🔴<br>En Vivo</div>
<div onclick="cargarProximos()">📅<br>Próximos</div>
<div onclick="cargarFinalizados()">✅<br>Finalizados</div>
</div>

<script>

const API_KEY="3cc8bf02536b52d0ecc667afdfd2859c";

async function obtener(endpoint){

const res=await fetch(endpoint,{
headers:{
"x-apisports-key":API_KEY
}
});

return await res.json();

}

function renderizar(data,tipo){

let html="";

if(!data.response || data.response.length===0){
document.getElementById("matches").innerHTML="<h2>No hay partidos disponibles</h2>";
return;
}

data.response.forEach(partido=>{

html+=`

<div class="card">

<div class="team">
<img src="${partido.teams.home.logo}">
${partido.teams.home.name}
</div>

<div class="team">
<img src="${partido.teams.away.logo}">
${partido.teams.away.name}
</div>

<div class="score">
${partido.goals.home ?? "-"} - ${partido.goals.away ?? "-"}
</div>

<p>🏆 ${partido.league.name}</p>

<p>
${tipo==="vivo"
? "⏱ "+partido.fixture.status.elapsed+"'"
: "📅 "+new Date(partido.fixture.date).toLocaleString()}
</p>

</div>

`;

});

document.getElementById("matches").innerHTML=html;

}

async function cargarEnVivo(){

document.getElementById("matches").innerHTML="Cargando en vivo...";

const data=await obtener(
"https://v3.football.api-sports.io/fixtures?live=all"
);

renderizar(data,"vivo");

}

async function cargarProximos(){

document.getElementById("matches").innerHTML="Cargando próximos...";

const hoy=new Date().toISOString().split("T")[0];

const data=await obtener(
`https://v3.football.api-sports.io/fixtures?date=${hoy}&status=NS`
);

renderizar(data,"proximo");

}

async function cargarFinalizados(){

document.getElementById("matches").innerHTML="Cargando finalizados...";

const hoy=new Date().toISOString().split("T")[0];

const data=await obtener(
`https://v3.football.api-sports.io/fixtures?date=${hoy}&status=FT`
);

renderizar(data,"final");

}

cargarEnVivo();

setInterval(cargarEnVivo,300000);

</script>

</body>
</html>
