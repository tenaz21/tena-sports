<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TENA SPORTS</title>

<style>
body{
margin:0;
background:#020b1c;
font-family:Arial;
color:white;
}

header{
background:linear-gradient(90deg,#13294d,#1f3d70);
padding:25px;
text-align:center;
font-size:42px;
font-weight:bold;
}

.banner{
background:red;
padding:15px;
text-align:center;
font-weight:bold;
font-size:22px;
}

#matches{
padding:20px;
}

.card{
background:#0d1a30;
padding:25px;
margin-bottom:20px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,.5);
}

.live{
color:#00ff88;
font-weight:bold;
font-size:22px;
margin-bottom:15px;
display:flex;
align-items:center;
}

.live::before{
content:"";
width:15px;
height:15px;
background:red;
border-radius:50%;
display:inline-block;
margin-right:10px;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.3);opacity:.5;}
100%{transform:scale(1);}
}

.team{
font-size:28px;
font-weight:bold;
margin-bottom:10px;
}

.score{
font-size:35px;
color:#2f7cff;
font-weight:bold;
margin-top:15px;
}
</style>
</head>

<body>

<header>⚽ TENA SPORTS</header>

<div class="banner">
🔥 HOY: Resultados deportivos EN VIVO
</div>

<div id="matches">Cargando partidos...</div>

<script>

const apiKey = "46146fa668msh7fabe31efaaf8dep198920jsn3151b4847140";

fetch("https://livescore67.p.rapidapi.com/api/livescore/v1/football/live",{
method:"GET",
headers:{
"x-rapidapi-key":apiKey,
"x-rapidapi-host":"livescore67.p.rapidapi.com"
}
})
.then(response=>response.json())
.then(data=>{

console.log(data);
alert(JSON.stringify(data));

let html="";

if(data.data && data.data.length>0){

data.data.forEach(partido=>{

html+=`
<div class="card">

<div class="live">🔴 EN VIVO</div>

<div class="team">${partido.home_name}</div>

<div class="team">${partido.away_name}</div>

<div class="score">${partido.score}</div>

</div>
`;

});

}else{

html="<h2>No hay partidos en vivo</h2>";

}

document.getElementById("matches").innerHTML=html;

})
.catch(error=>{

console.log(error);

document.getElementById("matches").innerHTML="<h2>Error de API</h2>";

});

</script>

</body>
</html>
