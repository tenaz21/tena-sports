<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TENA SPORTS</title>

<style>
body{
margin:0;
background:#02122b;
font-family:Arial;
color:white;
}

header{
background:linear-gradient(90deg,#1144ff,#2255ff);
padding:25px;
font-size:40px;
font-weight:bold;
text-align:center;
}

.banner{
background:red;
padding:20px;
font-size:26px;
font-weight:bold;
}

.liga{
background:#132850;
padding:15px;
font-size:18px;
font-weight:bold;
}

.card{
background:#10295a;
margin:20px;
padding:25px;
border-radius:25px;
box-shadow:0 0 20px rgba(0,0,0,.5);
}

.estado{
color:#00ff7f;
font-size:28px;
font-weight:bold;
}

.equipos{
font-size:24px;
margin:15px 0;
line-height:1.7;
}

.score{
font-size:55px;
font-weight:bold;
}

.minute{
font-size:28px;
color:#00ff88;
margin-top:15px;
}

button{
width:100%;
padding:18px;
margin-top:20px;
border:none;
border-radius:15px;
background:#2f68ff;
color:white;
font-size:24px;
font-weight:bold;
cursor:pointer;
}

.detalles{
display:none;
background:#021633;
margin-top:20px;
padding:20px;
border-radius:15px;
font-size:14px;
color:#00ff88;
white-space:pre-wrap;
overflow:auto;
}
</style>
</head>

<body>

<header>⚽ TENA SPORTS</header>

<div class="banner">
🔥 HOY: Resultados deportivos EN VIVO
</div>

<div id="matches">
<h2 style="padding:20px;">Cargando partidos...</h2>
</div>

<script>

const apiKey="46146fa668msh7fabe31efaaf8dep198920jsn3151b4847140";

async function cargarPartidos(){

const res=await fetch(
"https://livescore67.p.rapidapi.com/api/livescore/v1/match/live?sport_id=football",
{
method:"GET",
headers:{
"x-rapidapi-key":apiKey,
"x-rapidapi-host":"livescore67.p.rapidapi.com"
}
});

const data=await res.json();

let html="";

data.forEach(liga=>{

html+=`
<div class="liga">
🏆 ${liga.stage.stage_name}
</div>
`;

liga.matches.forEach(partido=>{

html+=`
<div class="card">

<div class="estado">🔴 EN VIVO</div>

<div class="equipos">
${partido.team_home[0].team_name}<br>
${partido.team_away[0].team_name}
</div>

<div class="score">
${partido.scores.home} - ${partido.scores.away}
</div>

<div class="minute">
⏱ ${partido.match_status.live_time}'
</div>

<button onclick="verDetalles(
'${partido.match_id}',
'${liga.country.country_code}',
'${liga.stage.stage_code}'
)">
Ver detalles
</button>

<div class="detalles" id="detalle-${partido.match_id}"></div>

</div>
`;
});

});

document.getElementById("matches").innerHTML=html;

}

async function verDetalles(matchId,countryCode,stageCode){

const box=document.getElementById("detalle-"+matchId);

if(box.style.display==="block"){
box.style.display="none";
return;
}

box.style.display="block";
box.innerHTML="Cargando detalles...";

const res=await fetch(
`https://livescore67.p.rapidapi.com/api/livescore/v1/match/details?sport_id=football&country_code=${countryCode}&stage_code=${stageCode}&match_id=${matchId}`,
{
method:"GET",
headers:{
"x-rapidapi-key":apiKey,
"x-rapidapi-host":"livescore67.p.rapidapi.com"
}
});

const data=await res.json();

box.innerHTML=`
${JSON.stringify(data,null,2)}
`;

}

cargarPartidos();

setInterval(cargarPartidos,10000);

</script>

</body>
</html>
