<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TENA SPORTS</title>

<style>
body{
margin:0;
background:#021427;
font-family:Arial,sans-serif;
color:white;
}

.header{
background:linear-gradient(90deg,#0055ff,#39a9ff);
padding:25px;
font-size:32px;
font-weight:bold;
text-align:center;
}

.banner{
background:red;
padding:20px;
font-size:24px;
font-weight:bold;
}

#matches{
padding:20px;
}

.card{
background:#2e4f9e;
padding:20px;
margin-bottom:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.team{
font-size:28px;
font-weight:bold;
margin-bottom:10px;
}

.score{
font-size:45px;
font-weight:bold;
margin:15px 0;
}

.date{
font-size:20px;
opacity:0.8;
}

.loading{
font-size:28px;
padding:20px;
}

.error{
color:red;
font-size:28px;
padding:20px;
}
</style>
</head>

<body>

<div class="header">
⚽ TENA SPORTS
</div>

<div class="banner">
🔥 HOY: Resultados deportivos EN VIVO
</div>

<div id="matches" class="loading">
Cargando partidos...
</div>

<script>

async function cargarPartidos(){

try{

const res = await fetch(
"https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id=4328"
);

const data = await res.json();

let html="";

data.events.forEach(partido=>{

html += `
<div class="card">

<div class="team">
${partido.strHomeTeam}
</div>

<div class="team">
${partido.strAwayTeam}
</div>

<div class="score">
VS
</div>

<div class="date">
📅 ${partido.dateEvent}
<br><br>
🕒 ${partido.strTime}
</div>

</div>
`;

});

document.getElementById("matches").innerHTML = html;

}catch(error){

document.getElementById("matches").innerHTML =
"<div class='error'>ERROR: "+error+"</div>";

}

}

cargarPartidos();

</script>

</body>
</html>
