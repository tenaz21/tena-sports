<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TENA SPORTS</title>

<style>
body{
margin:0;
font-family:Arial;
background:#021427;
color:white;
padding-bottom:120px;
}
.header{
background:linear-gradient(90deg,#004cff,#39a9ff);
padding:25px;
font-size:32px;
font-weight:bold;
text-align:center;
}
.banner{
background:red;
padding:20px;
font-size:24px;
font-weight:bold;
}
.card{
background:#26478d;
margin:15px;
padding:20px;
border-radius:20px;
}
.liga{
background:#19386b;
padding:15px;
font-size:22px;
font-weight:bold;
}
.score{
font-size:55px;
font-weight:bold;
margin:20px 0;
}
.bottomnav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#00152d;
}
.navbtn{
flex:1;
padding:20px;
text-align:center;
font-weight:bold;
cursor:pointer;
}
.active{
color:#00bfff;
}
.live{
box-shadow:0 0 20px #00ff99;
}
</style>
</head>
<body>

<div class="header">⚽ TENA SPORTS</div>

<div class="banner" id="tituloBanner">
🔥 HOY: Resultados deportivos EN VIVO
</div>

<div id="matches"></div>

<div class="bottomnav">
<div class="navbtn active" onclick="verEnVivo(this)">🔴<br>En Vivo</div>
<div class="navbtn" onclick="verProximos(this)">📅<br>Próximos</div>
<div class="navbtn" onclick="verFinalizados(this)">✅<br>Finalizados</div>
</div>

<script>

const API_KEY="46146fa668msh7fabe31efaaf8dep198920jsn3151b4847140";

let todosPartidos=[];

function activar(btn){
document.querySelectorAll(".navbtn").forEach(x=>x.classList.remove("active"));
btn.classList.add("active");
}

function fechaHoy(){
return new Date().toISOString().split("T")[0];
}

async function cargarTodo(){

let url=`https://livescore67.p.rapidapi.com/api/livescore/v1/match/list?sport_id=football&date=${fechaHoy()}`;

const res=await fetch(url,{
headers:{
"x-rapidapi-key":API_KEY,
"x-rapidapi-host":"livescore67.p.rapidapi.com"
}
});

let data=await res.json();

console.log(data);

todosPartidos=data.data||data||[];

verEnVivo();

}

function render(lista,tipo){

if(!lista.length){

document.getElementById("matches").innerHTML=
"<h2 style='padding:20px'>No hay partidos disponibles</h2>";

return;

}

let html="";

lista.forEach(liga=>{

if(!liga.matches)return;

html+=`
<div class="liga">
🏆 ${liga.stage.stage_name}
</div>
`;

liga.matches.forEach(p=>{

let home=p.team_home?.[0]?.team_name||"-";
let away=p.team_away?.[0]?.team_name||"-";

let hs=p.scores?.home??"-";
let as=p.scores?.away??"-";

let vivo=p.match_status?.live===1;

let finalizado=p.match_status?.finished===1;

let clase="";

let estado="";

if(vivo){

estado="🔴 EN VIVO";
clase="live";

}else if(finalizado){

estado="✅ FINALIZADO";

}else{

estado="📅 PRÓXIMO";

}

if(tipo==="live"&&!vivo)return;
if(tipo==="next"&&(vivo||finalizado))return;
if(tipo==="finished"&&!finalizado)return;

html+=`

<div class="card ${clase}">

<h2>${estado}</h2>

<br>

<div>${home}</div>
<div>${away}</div>

<div class="score">
${hs} - ${as}
</div>

<div>
⏱ ${
vivo
? p.match_status.live_time
: new Date(p.match_date).toLocaleString("es-PE",{
timeZone:"America/Lima"
})
}
</div>

</div>

`;

});

});

document.getElementById("matches").innerHTML=html;

}

function verEnVivo(btn){

if(btn)activar(btn);

document.getElementById("tituloBanner").innerHTML=
"🔥 HOY: Resultados deportivos EN VIVO";

render(todosPartidos,"live");

}

function verProximos(btn){

if(btn)activar(btn);

document.getElementById("tituloBanner").innerHTML=
"📅 Próximos partidos";

render(todosPartidos,"next");

}

function verFinalizados(btn){

if(btn)activar(btn);

document.getElementById("tituloBanner").innerHTML=
"✅ Partidos Finalizados";

render(todosPartidos,"finished");

}

cargarTodo();

setInterval(cargarTodo,30000);

</script>

</body>
</html>
