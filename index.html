<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TENA SPORTS</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000d26;
color:white;
padding-bottom:90px;
}

.header{
background:#16356d;
padding:25px;
text-align:center;
font-size:40px;
font-weight:bold;
}

.banner{
background:red;
padding:20px;
font-size:22px;
font-weight:bold;
}

#matches{
padding:20px;
}

.card{
background:#081a3d;
padding:20px;
margin-bottom:20px;
border-radius:20px;
box-shadow:0 0 15px rgba(0,0,0,.5);
animation:fadeIn .5s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.live{
color:#00ff88;
font-size:22px;
font-weight:bold;
margin-bottom:15px;
}

.league{
color:#ffc107;
font-size:18px;
margin-bottom:15px;
font-weight:bold;
}

.team{
font-size:24px;
margin:10px 0;
display:flex;
align-items:center;
gap:10px;
}

.logo{
width:35px;
height:35px;
border-radius:50%;
object-fit:cover;
}

.score{
font-size:30px;
font-weight:bold;
margin-top:15px;
}

.minute{
color:#00ff88;
font-size:20px;
margin-top:10px;
font-weight:bold;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#081a3d;
display:flex;
justify-content:space-around;
padding:12px 0;
box-shadow:0 -2px 15px rgba(0,0,0,.4);
z-index:999;
}

.nav-btn{
display:flex;
flex-direction:column;
align-items:center;
color:white;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

.nav-btn span{
font-size:12px;
margin-top:5px;
}

.nav-btn.active{
color:#00ff88;
}
</style>

</head>
<body>

<div class="header">
⚽ TENA SPORTS
</div>

<div class="banner">
🔥 HOY: Resultados deportivos EN VIVO
</div>

<div id="matches">
Cargando partidos...
</div>

<script>

const apiKey = "46146fa668msh7fabe31efaaf8dep198920jsn3151b4847140";

function cargarPartidos(){

fetch("https://livescore67.p.rapidapi.com/api/livescore/v1/match/live?sport_id=football",{
method:"GET",
cache:"no-store",
headers:{
"x-rapidapi-key":apiKey,
"x-rapidapi-host":"livescore67.p.rapidapi.com"
}
})
.then(response=>response.json())
.then(data=>{

let html="";

if(data.length > 0){

data.forEach(liga=>{

liga.matches.forEach(partido=>{

html += `
<div class="card">

<div class="live">🔴 EN VIVO</div>

<div class="league">
🏆 ${liga.country.country_name} - ${liga.stage.stage_name}
</div>

<div class="team">
<img src="${partido.team_home[0].team_image_path}" class="logo">
${partido.team_home[0].team_name}
</div>

<div class="team">
<img src="${partido.team_away[0].team_image_path}" class="logo">
${partido.team_away[0].team_name}
</div>

<div class="score">
⚽ ${partido.scores.home} - ${partido.scores.away}
</div>

<div class="minute">
⏱ ${partido.match_status.live_time}'
</div>

</div>
`;

});

});

}else{

html="<h2>No hay partidos en vivo actualmente</h2>";

}

document.getElementById("matches").innerHTML=html;

})
.catch(error=>{

document.getElementById("matches").innerHTML=
"<h2>Error cargando partidos</h2>";

});

}

cargarPartidos();

setInterval(cargarPartidos,10000);

</script>

<div class="bottom-nav">

<div class="nav-btn active">
🏠
<span>Inicio</span>
</div>

<div class="nav-btn">
🔴
<span>En Vivo</span>
</div>

<div class="nav-btn">
📅
<span>Próximos</span>
</div>

<div class="nav-btn">
✅
<span>Finalizados</span>
</div>

</div>

</body>
</html>
