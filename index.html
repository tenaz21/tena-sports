<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TENA SPORTS</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#021427;
color:white;
padding-bottom:100px;
}

.header{
background:linear-gradient(90deg,#004cff,#39a9ff);
padding:25px;
font-size:32px;
font-weight:bold;
text-align:center;
}

.banner{
background:red;
padding:20px;
font-size:24px;
font-weight:bold;
}

#matches{
padding:20px;
}

.liga{
background:#19386b;
padding:15px;
font-size:22px;
font-weight:bold;
margin-top:15px;
border-radius:10px;
}

.card{
background:#26478d;
padding:20px;
margin-top:15px;
border-radius:20px;
}

.estado{
font-size:26px;
font-weight:bold;
margin-bottom:15px;
}

.score{
font-size:55px;
font-weight:bold;
margin:20px 0;
}

.bottomnav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#00152d;
}

.navbtn{
flex:1;
padding:20px;
text-align:center;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.active{
color:#00bfff;
}
</style>
</head>
<body>

<div class="header">⚽ TENA SPORTS</div>

<div class="banner" id="tituloBanner">
🔥 HOY: Resultados deportivos EN VIVO
</div>

<div id="matches">
Cargando partidos...
</div>

<div class="bottomnav">
<div class="navbtn active" onclick="verEnVivo(this)">🔴<br>En Vivo</div>
<div class="navbtn" onclick="verProximos(this)">📅<br>Próximos</div>
<div class="navbtn" onclick="verFinalizados(this)">✅<br>Finalizados</div>
</div>

<script>

const API_TOKEN = "33383a1b11c24b09b892548b771985b4";

let modoActual="live";

function activar(btn){
document.querySelectorAll(".navbtn").forEach(x=>x.classList.remove("active"));
btn.classList.add("active");
}

function fechaPeru(fecha){
return new Date(fecha).toLocaleString("es-PE",{
timeZone:"America/Lima",
day:"numeric",
month:"short",
hour:"numeric",
minute:"2-digit"
});
}

async function obtenerPartidos(){

try{

let res=await fetch("https://api.football-data.org/v4/matches",{
headers:{
"X-Auth-Token":API_TOKEN
}
});

let data=await res.json();

renderizar(data.matches);

}catch(e){

document.getElementById("matches").innerHTML=
"<h2 style='color:red;'>Error cargando partidos</h2>";

}

}

function renderizar(partidos){

let html="";

let filtrados=[];

if(modoActual==="live"){
filtrados=partidos.filter(p=>p.status==="IN_PLAY"||p.status==="PAUSED");
}

if(modoActual==="next"){
filtrados=partidos.filter(p=>p.status==="TIMED");
}

if(modoActual==="finished"){
filtrados=partidos.filter(p=>p.status==="FINISHED");
}

if(filtrados.length===0){

document.getElementById("matches").innerHTML=
"<h2>No hay partidos disponibles</h2>";

return;

}

filtrados.forEach(p=>{

let estadoTexto="";

if(modoActual==="live") estadoTexto="🔴 EN VIVO";
if(modoActual==="next") estadoTexto="📅 PRÓXIMO";
if(modoActual==="finished") estadoTexto="✅ FINALIZADO";

html+=`

<div class="liga">
🏆 ${p.competition.name}
</div>

<div class="card">

<div class="estado">${estadoTexto}</div>

<div>${p.homeTeam.name}</div>

<br>

<div>${p.awayTeam.name}</div>

<div class="score">
${p.score.fullTime.home ?? "-"} - ${p.score.fullTime.away ?? "-"}
</div>

<div>
⏱ ${fechaPeru(p.utcDate)}
</div>

</div>

`;

});

document.getElementById("matches").innerHTML=html;

}

function verEnVivo(btn){
modoActual="live";
activar(btn);
document.getElementById("tituloBanner").innerHTML=
"🔥 HOY: Resultados deportivos EN VIVO";
obtenerPartidos();
}

function verProximos(btn){
modoActual="next";
activar(btn);
document.getElementById("tituloBanner").innerHTML=
"📅 Próximos partidos";
obtenerPartidos();
}

function verFinalizados(btn){
modoActual="finished";
activar(btn);
document.getElementById("tituloBanner").innerHTML=
"✅ Partidos Finalizados";
obtenerPartidos();
}

obtenerPartidos();

setInterval(obtenerPartidos,30000);

</script>

</body>
</html>
