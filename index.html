<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TENA SPORTS</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#07142d,#020b18);
color:white;
padding-bottom:100px;
}

.header{
background:linear-gradient(90deg,#1e3c72,#2a5298);
padding:25px;
font-size:38px;
font-weight:bold;
text-align:center;
}

.title-bar{
background:linear-gradient(90deg,#ff512f,#dd2476);
padding:18px;
font-size:24px;
font-weight:bold;
}

.card{
background:#0d1b3d;
margin:20px;
padding:25px;
border-radius:25px;
box-shadow:0 8px 20px rgba(0,0,0,.4);
}

.live{
font-size:28px;
font-weight:bold;
color:#00ff88;
margin-bottom:10px;
}

.team{
display:flex;
align-items:center;
gap:12px;
font-size:26px;
margin:10px 0;
}

.team img{
width:35px;
height:35px;
}

.score{
font-size:35px;
font-weight:bold;
margin-top:15px;
}

.minute{
font-size:24px;
color:#00ff88;
margin-top:10px;
}

.bottom-nav{
position:fixed;
bottom:0;
width:100%;
background:#09182f;
display:flex;
justify-content:space-around;
padding:15px 0;
}

.nav-btn{
display:flex;
flex-direction:column;
align-items:center;
color:white;
cursor:pointer;
}

.active{
color:#00ff88;
}
</style>
</head>
<body>

<div class="header">⚽ TENA SPORTS</div>

<div class="title-bar" id="titulo">
🔥 HOY: Resultados deportivos
</div>

<div id="matches">
Cargando partidos...
</div>

<div class="bottom-nav">

<div class="nav-btn active" onclick="mostrarInicio(this)">
🏠
<span>Inicio</span>
</div>

<div class="nav-btn" onclick="mostrarEnVivo(this)">
🔴
<span>En Vivo</span>
</div>

<div class="nav-btn" onclick="mostrarProximos(this)">
📅
<span>Próximos</span>
</div>

<div class="nav-btn" onclick="mostrarFinalizados(this)">
✅
<span>Finalizados</span>
</div>

</div>

<script>

const apiKey="46146fa668msh7fabe31efaaf8dep198920jsn3151b4847140";

let cachePartidos=[];



function activar(btn){

document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

}



function formatearFecha(offset=0){

let fecha=new Date();

fecha.setDate(fecha.getDate()+offset);

return fecha.toISOString().split("T")[0];

}



function renderizar(data,titulo){

document.getElementById("titulo").innerHTML=titulo;

let html="";

if(!data.length){

html="<h2 style='padding:20px;'>No hay partidos disponibles</h2>";

}else{

data.forEach(partido=>{

html+=`

<div class="card">

<div class="live">${partido.estado}</div>

<div class="team">
<img src="${partido.logo1}">
${partido.equipo1}
</div>

<div class="team">
<img src="${partido.logo2}">
${partido.equipo2}
</div>

<div class="score">
⚽ ${partido.score}
</div>

<div class="minute">
⏱ ${partido.minuto}
</div>

</div>

`;

});

}

document.getElementById("matches").innerHTML=html;

}



function cargarLive(){

fetch(`https://livescore67.p.rapidapi.com/api/livescore/v1/match/live?sport_id=football`,{

method:"GET",

headers:{
"x-rapidapi-key":apiKey,
"x-rapidapi-host":"livescore67.p.rapidapi.com"
}

})

.then(res=>res.json())

.then(data=>{

cachePartidos=[];

data.forEach(liga=>{

liga.matches.forEach(partido=>{

cachePartidos.push({

estado:"🔴 EN VIVO",

equipo1:partido.team_home[0].team_name,
equipo2:partido.team_away[0].team_name,

logo1:partido.team_home[0].team_image_path,
logo2:partido.team_away[0].team_image_path,

score:`${partido.scores.home} - ${partido.scores.away}`,

minuto:`${partido.match_status.live_time}'`

});

});

});

renderizar(cachePartidos,"🔥 HOY: Resultados deportivos");

});

}



function cargarPorFecha(offset,titulo){

let fecha=formatearFecha(offset);

fetch(`https://livescore67.p.rapidapi.com/api/livescore/v1/match/list?sport_id=football&date=${fecha}`,{

method:"GET",

headers:{
"x-rapidapi-key":apiKey,
"x-rapidapi-host":"livescore67.p.rapidapi.com"
}

})

.then(res=>res.json())

.then(data=>{

let partidos=[];

data.forEach(liga=>{

liga.matches.forEach(partido=>{

partidos.push({

estado:"⚽ PROGRAMADO",

equipo1:partido.team_home[0].team_name,
equipo2:partido.team_away[0].team_name,

logo1:partido.team_home[0].team_image_path,
logo2:partido.team_away[0].team_image_path,

score:"vs",

minuto:partido.match_date

});

});

});

renderizar(partidos,titulo);

});

}



function mostrarInicio(btn){

activar(btn);

cargarLive();

}



function mostrarEnVivo(btn){

activar(btn);

cargarLive();

}



function mostrarProximos(btn){

activar(btn);

cargarPorFecha(1,"📅 PRÓXIMOS PARTIDOS");

}



function mostrarFinalizados(btn){

activar(btn);

cargarPorFecha(-1,"✅ PARTIDOS FINALIZADOS");

}



cargarLive();

setInterval(cargarLive,30000);

</script>

</body>
</html>
