<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TENA SPORTS</title>

<style>
body{
margin:0;
background:#021427;
font-family:Arial;
color:white;
padding-bottom:110px;
}

.header{
background:linear-gradient(90deg,#004dff,#35a7ff);
padding:25px;
font-size:32px;
font-weight:bold;
text-align:center;
}

.banner{
background:red;
padding:20px;
font-size:24px;
font-weight:bold;
}

.controls{
padding:15px;
background:#041a33;
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
}

.buscar{
padding:12px 20px;
background:#00aaff;
border:none;
border-radius:10px;
font-weight:bold;
color:white;
}

.liga{
background:#16325f;
padding:15px;
font-size:22px;
font-weight:bold;
}

.card{
background:#1d3f80;
margin:15px;
padding:20px;
border-radius:20px;
box-shadow:0 0 20px #00000050;
}

.estado{
font-size:26px;
font-weight:bold;
color:#00ff99;
margin-bottom:15px;
}

.score{
font-size:50px;
font-weight:bold;
margin:20px 0;
}

.detalles{
margin-top:15px;
padding:15px;
background:#00152f;
border-radius:15px;
display:none;
}

button{
width:100%;
padding:15px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
border:none;
border-radius:15px;
font-size:18px;
font-weight:bold;
color:white;
margin-top:15px;
}

.bottomnav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#00152d;
}

.navbtn{
flex:1;
padding:18px;
text-align:center;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.active{
color:#00bfff;
}
</style>
</head>
<body>

<div class="header">⚽ TENA SPORTS</div>

<div class="banner" id="tituloBanner">
🔥 HOY: Resultados deportivos EN VIVO
</div>

<div class="controls">
<input type="date" id="fechaInput">
<button class="buscar" onclick="buscarFecha()">Buscar</button>
</div>

<div id="matches"></div>

<div class="bottomnav">
<div class="navbtn active" onclick="verEnVivo(this)">🔴<br>En Vivo</div>
<div class="navbtn" onclick="verProximos(this)">📅<br>Próximos</div>
<div class="navbtn" onclick="verFinalizados(this)">✅<br>Finalizados</div>
</div>

<script>

const API_KEY="46146fa668msh7fabe31efaaf8dep198920jsn3151b4847140";

function activar(btn){
document.querySelectorAll(".navbtn").forEach(x=>x.classList.remove("active"));
btn.classList.add("active");
}

function fechaHoy(){
return new Date().toISOString().split("T")[0];
}

function fechaMañana(){
let d=new Date();
d.setDate(d.getDate()+1);
return d.toISOString().split("T")[0];
}

function fechaAyer(){
let d=new Date();
d.setDate(d.getDate()-1);
return d.toISOString().split("T")[0];
}

async function obtener(url){

const res=await fetch(url,{
method:"GET",
headers:{
"x-rapidapi-key":API_KEY,
"x-rapidapi-host":"livescore6.p.rapidapi.com"
}
});

const data=await res.json();

console.log(data);

return data;
}

async function verEnVivo(btn){
activar(btn);

document.getElementById("tituloBanner").innerHTML=
"🔥 HOY: Resultados deportivos EN VIVO";

let data=await obtener(
"https://livescore6.p.rapidapi.com/api/livescore/v1/match/live"
);

renderizar(data.data || []);
}

async function verProximos(btn){
activar(btn);

document.getElementById("tituloBanner").innerHTML=
"📅 Próximos partidos";

let data=await obtener(
`https://livescore6.p.rapidapi.com/api/livescore/v1/match/list?date=${fechaMañana()}`
);

renderizar(data.data || []);
}

async function verFinalizados(btn){
activar(btn);

document.getElementById("tituloBanner").innerHTML=
"✅ Partidos Finalizados";

let data=await obtener(
`https://livescore6.p.rapidapi.com/api/livescore/v1/match/list?date=${fechaAyer()}`
);

renderizar(data.data || []);
}

async function buscarFecha(){

let fecha=document.getElementById("fechaInput").value;

if(!fecha)return;

document.getElementById("tituloBanner").innerHTML=
"📆 Partidos del "+fecha;

let data=await obtener(
`https://livescore6.p.rapidapi.com/api/livescore/v1/match/list?date=${fecha}`
);

renderizar(data.data || []);
}

function toggleDetalles(id){
let box=document.getElementById(id);

box.style.display=
box.style.display==="block"
? "none"
: "block";
}

function renderizar(partidos){

let html="";

if(partidos.length===0){
html="<h2 style='padding:20px'>No hay partidos aquí</h2>";
document.getElementById("matches").innerHTML=html;
return;
}

let agrupados={};

partidos.forEach(p=>{

let liga=p.league_name || "Sin liga";

if(!agrupados[liga]) agrupados[liga]=[];

agrupados[liga].push(p);

});

let contador=0;

for(let liga in agrupados){

html+=`<div class="liga">🏆 ${liga}</div>`;

agrupados[liga].forEach(p=>{

contador++;

html+=`

<div class="card">

<div class="estado">
${p.status || "PARTIDO"}
</div>

<div style="font-size:20px;">
${p.home_name}<br><br>
${p.away_name}
</div>

<div class="score">
${p.scores?.home ?? "-"} - ${p.scores?.away ?? "-"}
</div>

<div>
⏱ ${p.match_status?.live_time || p.match_date || ""}
</div>

<button onclick="toggleDetalles('det${contador}')">
Ver detalles
</button>

<div class="detalles" id="det${contador}">
📅 Fecha: ${p.match_date || "No disponible"}<br><br>
🏆 Liga: ${p.league_name || "No disponible"}<br><br>
🌍 País: ${p.country_name || "No disponible"}<br><br>
📌 Estado: ${p.status || "No disponible"}
</div>

</div>

`;

});

}

document.getElementById("matches").innerHTML=html;
}

verEnVivo();

</script>

</body>
</html>
