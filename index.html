<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TENA SPORTS</title>

<style>
body{
margin:0;
font-family:Arial;
background:#021427;
color:white;
padding-bottom:120px;
}
.header{
background:linear-gradient(90deg,#004cff,#39a9ff);
padding:25px;
font-size:32px;
font-weight:bold;
text-align:center;
}
.banner{
background:red;
padding:20px;
font-size:24px;
font-weight:bold;
}
.card{
background:#26478d;
margin:15px;
padding:20px;
border-radius:20px;
}
.liga{
background:#19386b;
padding:15px;
font-size:22px;
font-weight:bold;
}
.score{
font-size:55px;
font-weight:bold;
margin:20px 0;
}
.bottomnav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#00152d;
}
.navbtn{
flex:1;
padding:20px;
text-align:center;
font-weight:bold;
cursor:pointer;
}
.active{
color:#00bfff;
}
</style>
</head>
<body>

<div class="header">⚽ TENA SPORTS</div>

<div class="banner" id="tituloBanner">
🔥 HOY: Resultados deportivos EN VIVO
</div>

<div id="matches"></div>

<div class="bottomnav">
<div class="navbtn active" onclick="verEnVivo(this)">🔴<br>En Vivo</div>
<div class="navbtn" onclick="verProximos(this)">📅<br>Próximos</div>
<div class="navbtn" onclick="verFinalizados(this)">✅<br>Finalizados</div>
</div>

<script>

const API_KEY="46146fa668msh7fabe31efaaf8dep198920jsn3151b4847140";

let modoActual="live";

function activar(btn){
document.querySelectorAll(".navbtn").forEach(x=>x.classList.remove("active"));
btn.classList.add("active");
}

function fechaOffset(dias){
let d=new Date();
d.setDate(d.getDate()+dias);
return d.toISOString().split("T")[0];
}

async function obtener(fecha=null,enVivo=false){

let url="";

if(enVivo){

url="https://livescore67.p.rapidapi.com/api/livescore/v1/match/live?sport_id=football";

}else{

url=`https://livescore67.p.rapidapi.com/api/livescore/v1/match/list?sport_id=football&date=${fecha}`;

}

const res=await fetch(url,{
headers:{
"x-rapidapi-key":API_KEY,
"x-rapidapi-host":"livescore67.p.rapidapi.com"
}
});

let json=await res.json();

console.log(json);

let partidos=
json.data ||
json.Stages ||
json.stages ||
json;

render(partidos);

}

function render(data){

if(!Array.isArray(data)||data.length===0){

document.getElementById("matches").innerHTML=
"<h2 style='padding:20px'>No hay partidos disponibles</h2>";

return;

}

let html="";

data.forEach(liga=>{

let matches=
liga.matches ||
liga.Events ||
[];

if(matches.length===0)return;

html+=`
<div class="liga">
🏆 ${liga.stage?.stage_name || liga.Snm || "Liga"}
</div>
`;

matches.forEach(p=>{

let home=
p.team_home?.[0]?.team_name ||
p.T1?.[0]?.Nm ||
"-";

let away=
p.team_away?.[0]?.team_name ||
p.T2?.[0]?.Nm ||
"-";

let hs=
p.scores?.home ||
p.Tr1 ||
"-";

let as=
p.scores?.away ||
p.Tr2 ||
"-";

html+=`

<div class="card">

<div>
${modoActual==="live"?"🔴 EN VIVO":
modoActual==="next"?"📅 PRÓXIMO":
"✅ FINALIZADO"}
</div>

<br>

<div>${home}</div>

<div>${away}</div>

<div class="score">
${hs} - ${as}
</div>

</div>

`;

});

});

document.getElementById("matches").innerHTML=html;

}

function verEnVivo(btn){

modoActual="live";

activar(btn);

obtener(null,true);

}

function verProximos(btn){

modoActual="next";

activar(btn);

obtener(fechaOffset(1));

}

function verFinalizados(btn){

modoActual="finished";

activar(btn);

obtener(fechaOffset(-1));

}

verEnVivo();

</script>

</body>
</html>
