<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TENA SPORTS</title>

<style>
body{
margin:0;
background:#020b1c;
font-family:Arial;
color:white;
}

header{
background:linear-gradient(90deg,#13294d,#1f3d70);
padding:25px;
text-align:center;
font-size:42px;
font-weight:bold;
}

.banner{
background:red;
padding:15px;
text-align:center;
font-weight:bold;
font-size:22px;
}

#matches{
padding:20px;
}

.card{
background:#0d1a30;
padding:25px;
margin-bottom:20px;
border-radius:20px;
}
</style>
</head>

<body>

<header>⚽ TENA SPORTS</header>

<div class="banner">
🔥 HOY: Resultados deportivos EN VIVO
</div>

<div id="matches"></div>

<script>

const apiKey = "46146fa668msh7fabe31efaaf8dep198920jsn3151b4847140";

fetch("https://livescore67.p.rapidapi.com/matches/v2/list-live?Category=soccer",{
method:"GET",
headers:{
"x-rapidapi-key":apiKey,
"x-rapidapi-host":"livescore67.p.rapidapi.com"
}
})
.then(response=>response.json())
.then(data=>{

let html="";

if(data.Stages && data.Stages.length>0){

data.Stages.forEach(stage=>{

stage.Events.forEach(partido=>{

html+=`
<div class="card">
<h2>${partido.T1[0].Nm} vs ${partido.T2[0].Nm}</h2>
<p>⚽ Marcador: ${partido.Tr1} - ${partido.Tr2}</p>
</div>
`;

});

});

}else{
html="<h2>No hay partidos en vivo</h2>";
}

document.getElementById("matches").innerHTML=html;

})
.catch(error=>{

console.log(error);

document.getElementById("matches").innerHTML=
"<h2>Error conectando API</h2>";

});

</script>

</body>
</html>
