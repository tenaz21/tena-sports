<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TENA SPORTS</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(180deg,#021024,#031b3d);
color:white;
padding-bottom:100px;
}

/* HEADER */
header{
background:linear-gradient(90deg,#0048ff,#1e90ff);
padding:20px;
font-size:34px;
font-weight:bold;
text-align:center;
position:sticky;
top:0;
z-index:999;
box-shadow:0 4px 15px rgba(0,0,0,.5);
}

/* BANNER */
.banner{
background:linear-gradient(90deg,#ff2d2d,#ff0000);
padding:20px;
font-size:25px;
font-weight:bold;
}

/* LIGAS */
.liga{
background:#112a55;
padding:15px;
font-size:22px;
font-weight:bold;
border-left:5px solid gold;
}

/* CARD */
.card{
background:linear-gradient(180deg,#183d82,#102d66);
margin:20px;
padding:25px;
border-radius:25px;
box-shadow:
0 10px 25px rgba(0,0,0,.4),
0 0 20px rgba(0,100,255,.15);
animation:fade .4s ease;
border:1px solid rgba(255,255,255,.05);
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.estado{
font-size:30px;
font-weight:bold;
color:#00ff84;
text-shadow:0 0 10px #00ff84;
}

.equipos{
font-size:24px;
line-height:1.6;
margin:20px 0;
}

.score{
font-size:70px;
font-weight:bold;
text-shadow:
0 0 10px rgba(255,255,255,.2),
0 0 20px rgba(255,255,255,.1);
margin:15px 0;
}

.minute{
font-size:30px;
color:#00ff84;
font-weight:bold;
}

/* BOTONES */
button{
width:100%;
padding:18px;
margin-top:20px;
border:none;
border-radius:18px;
font-size:22px;
font-weight:bold;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
box-shadow:0 0 20px rgba(0,140,255,.4);
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.03);
}

/* DETALLES */
.detalles{
display:none;
margin-top:20px;
padding:20px;
background:#031126;
border-radius:18px;
font-size:19px;
line-height:1.8;
}

/* NAVBAR */
.navbar{
position:fixed;
bottom:0;
width:100%;
background:rgba(3,17,38,.95);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-around;
padding:10px 0;
box-shadow:0 -5px 20px rgba(0,0,0,.5);
border-top:1px solid rgba(255,255,255,.1);
z-index:999;
}

.nav-btn{
background:none;
border:none;
color:#aaa;
font-size:16px;
font-weight:bold;
display:flex;
flex-direction:column;
align-items:center;
gap:4px;
padding:8px;
transition:.3s;
}

.nav-btn.active{
color:#00c6ff;
transform:scale(1.08);
}
</style>
</head>
<body>

<header>⚽ TENA SPORTS</header>

<div class="banner">
🔥 HOY: Resultados deportivos EN VIVO
</div>

<div id="contenido"></div>

<!-- NAVBAR -->
<div class="navbar">
<button class="nav-btn active" onclick="mostrarSeccion('live')">
🔴
<span>En Vivo</span>
</button>

<button class="nav-btn" onclick="mostrarSeccion('upcoming')">
📅
<span>Próximos</span>
</button>

<button class="nav-btn" onclick="mostrarSeccion('finished')">
✅
<span>Finalizados</span>
</button>
</div>

<script>

const apiKey="46146fa668msh7fabe31efaaf8dep198920jsn3151b4847140";

let seccionActual="live";

function mostrarSeccion(tipo){

seccionActual=tipo;

document.querySelectorAll(".nav-btn").forEach(btn=>{
btn.classList.remove("active");
});

event.target.closest("button").classList.add("active");

cargarDatos();

}

function obtenerFecha(offset=0){

const fecha=new Date();

fecha.setDate(fecha.getDate()+offset);

return fecha.toISOString().split("T")[0];

}

async function cargarDatos(){

let url="";

if(seccionActual==="live"){
url=`https://livescore67.p.rapidapi.com/api/livescore/v1/match/live?sport_id=football`;
}

if(seccionActual==="upcoming"){
url=`https://livescore67.p.rapidapi.com/api/livescore/v1/match/list?sport_id=football&date=${obtenerFecha(1)}`;
}

if(seccionActual==="finished"){
url=`https://livescore67.p.rapidapi.com/api/livescore/v1/match/list?sport_id=football&date=${obtenerFecha(-1)}`;
}

const res=await fetch(url,{
headers:{
"x-rapidapi-key":apiKey,
"x-rapidapi-host":"livescore67.p.rapidapi.com"
}
});

const data=await res.json();

let html="";

data.forEach(liga=>{

if(!liga.matches || liga.matches.length===0)return;

html+=`
<div class="liga">
🏆 ${liga.stage.stage_name}
</div>
`;

liga.matches.forEach(partido=>{

html+=`
<div class="card">

<div class="estado">
${
seccionActual==="live"
?"🔴 EN VIVO"
:seccionActual==="finished"
?"✅ FINALIZADO"
:"📅 PRÓXIMO"
}
</div>

<div class="equipos">
${partido.team_home[0].team_name}<br>
${partido.team_away[0].team_name}
</div>

<div class="score">
${partido.scores?.home ?? "-"} - ${partido.scores?.away ?? "-"}
</div>

<div class="minute">
⏱ ${partido.match_status?.live_time ?? partido.match_date}
</div>

<button onclick="toggleDetalles('${partido.match_id}')">
Ver detalles
</button>

<div class="detalles" id="detalle-${partido.match_id}">
📅 Fecha: ${partido.match_date}<br>
🏆 Liga: ${liga.stage.stage_name}<br>
🌍 País: ${liga.country.country_name}<br>
⚽ Local: ${partido.team_home[0].team_name}<br>
⚽ Visitante: ${partido.team_away[0].team_name}
</div>

</div>
`;

});

});

document.getElementById("contenido").innerHTML=
html || "<h2 style='padding:20px;'>No hay partidos disponibles</h2>";

}

function toggleDetalles(id){

let box=document.getElementById("detalle-"+id);

box.style.display=
box.style.display==="block"
?"none"
:"block";

}

cargarDatos();

setInterval(()=>{

if(seccionActual==="live"){
cargarDatos();
}

},10000);

</script>

</body>
</html>
