<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TENA SPORTS</title>

<style>
body{
margin:0;
background:#021427;
font-family:Arial;
color:white;
}
.header{
background:linear-gradient(90deg,#004cff,#39a9ff);
padding:25px;
font-size:32px;
font-weight:bold;
text-align:center;
}
.banner{
background:red;
padding:20px;
font-size:24px;
font-weight:bold;
}
#matches{
padding:20px;
}
.card{
background:#26478d;
padding:20px;
margin-bottom:15px;
border-radius:15px;
}
.score{
font-size:40px;
font-weight:bold;
margin-top:10px;
}
</style>
</head>
<body>

<div class="header">⚽ TENA SPORTS</div>
<div class="banner">🔥 HOY: Resultados deportivos EN VIVO</div>

<div id="matches">
Cargando partidos...
</div>

<script>
<script>

async function cargarPartidos(){

try{

const res = await fetch(
"https://www.thesportsdb.com/api/v1/json/3/eventslast.php?id=133602"
);

const data = await res.json();

let html="";

data.results.forEach(p=>{

html += `
<div class="card">
<h2>${p.strHomeTeam}</h2>
<h2>${p.strAwayTeam}</h2>

<div class="score">
${p.intHomeScore ?? "-"} - ${p.intAwayScore ?? "-"}
</div>

<p>${p.dateEvent}</p>
</div>
`;

});

document.getElementById("matches").innerHTML=html;

}catch(error){

document.getElementById("matches").innerHTML=
"<h2 style='color:red'>"+error+"</h2>";

}

}

cargarPartidos();

</script>

</body>
</html>
