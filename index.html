<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TENA SPORTS</title>

<style>
body{
margin:0;
font-family:Arial;
background:#08142b;
color:white;
}

header{
background:linear-gradient(90deg,#1e3a8a,#2563eb);
padding:20px;
font-size:35px;
font-weight:bold;
text-align:center;
}

.top{
background:red;
padding:18px;
font-size:28px;
font-weight:bold;
}

.league{
background:#112244;
padding:15px;
font-size:24px;
font-weight:bold;
margin-top:10px;
}

.card{
background:#102850;
margin:15px;
padding:20px;
border-radius:20px;
}

.live{
color:#00ff88;
font-size:30px;
font-weight:bold;
}

.team{
font-size:28px;
margin:10px 0;
}

.score{
font-size:42px;
font-weight:bold;
margin-top:15px;
}

.minute{
color:#00ff88;
font-size:28px;
margin-top:10px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
background:#2563eb;
border:none;
border-radius:12px;
color:white;
font-size:22px;
font-weight:bold;
}

.details{
display:none;
margin-top:15px;
padding:15px;
background:#08142b;
border-radius:10px;
overflow:auto;
max-height:400px;
}
</style>
</head>
<body>

<header>⚽ TENA SPORTS</header>

<div class="top">
🔥 HOY: Resultados deportivos EN VIVO
</div>

<div id="matches"></div>

<script>

const apiKey="46146fa668msh7fabe31efaaf8dep198920jsn3151b4847140";

async function cargarPartidos(){

const res=await fetch(
"https://livescore67.p.rapidapi.com/api/livescore/v1/match/live?sport_id=football",
{
method:"GET",
headers:{
"x-rapidapi-key":apiKey,
"x-rapidapi-host":"livescore67.p.rapidapi.com"
}
});

const data=await res.json();

let html="";

data.forEach(liga=>{

html+=`
<div class="league">
🏆 ${liga.stage.stage_name}
</div>
`;

liga.matches.forEach(partido=>{

html+=`
<div class="card">

<div class="live">🔴 EN VIVO</div>

<div class="team">${partido.team_home[0].team_name}</div>

<div class="team">${partido.team_away[0].team_name}</div>

<div class="score">
${partido.scores.home} - ${partido.scores.away}
</div>

<div class="minute">
⏱ ${partido.match_status.live_time}'
</div>

<button onclick="verDetalles(
'${partido.match_id}',
'${liga.country.country_code}',
'${liga.stage.stage_code}'
)">
Ver detalles
</button>

<div id="detalle-${partido.match_id}" class="details"></div>

</div>
`;

});

});

document.getElementById("matches").innerHTML=html;

}

async function verDetalles(matchId,countryCode,stageCode){

const box=document.getElementById("detalle-"+matchId);

if(box.style.display==="block"){
box.style.display="none";
return;
}

box.style.display="block";
box.innerHTML="<h3>Cargando detalles...</h3>";

const res=await fetch(
`https://livescore67.p.rapidapi.com/api/livescore/v1/match/details?sport_id=football&country_code=${countryCode}&stage_code=${stageCode}&match_id=${matchId}`,
{
method:"GET",
headers:{
"x-rapidapi-key":apiKey,
"x-rapidapi-host":"livescore67.p.rapidapi.com"
}
});

const data=await res.json();

box.innerHTML=`
<pre style="
white-space:pre-wrap;
font-size:12px;
color:#00ff88;
overflow:auto;
">
${JSON.stringify(data,null,2)}
</pre>
`;

}

cargarPartidos();

setInterval(cargarPartidos,30000);

</script>

</body>
</html>
