<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TENA SPORTS</title>

<style>
body{
margin:0;
background:#001020;
font-family:Arial;
color:white;
padding-bottom:100px;
}

.header{
background:linear-gradient(90deg,#004cff,#33a1ff);
padding:20px;
font-size:32px;
font-weight:bold;
text-align:center;
}

.banner{
background:red;
padding:20px;
font-size:22px;
font-weight:bold;
}

.controls{
padding:15px;
display:flex;
gap:10px;
background:#02152d;
}

input{
flex:1;
padding:12px;
font-size:18px;
border:none;
border-radius:10px;
}

.buscar{
padding:12px 20px;
background:#00aaff;
border:none;
border-radius:10px;
color:white;
font-weight:bold;
}

.liga{
background:#162d5c;
padding:15px;
font-size:20px;
font-weight:bold;
}

.card{
background:#1c3d82;
margin:15px;
padding:20px;
border-radius:20px;
}

.estado{
font-size:24px;
color:#00ff88;
font-weight:bold;
}

.score{
font-size:50px;
font-weight:bold;
margin:15px 0;
}

button{
width:100%;
padding:15px;
background:linear-gradient(90deg,#11c7f3,#147dff);
border:none;
border-radius:15px;
font-size:18px;
font-weight:bold;
color:white;
margin-top:15px;
}

.bottomnav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#00152d;
}

.navbtn{
flex:1;
padding:18px;
text-align:center;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.active{
color:#00bbff;
}
</style>
</head>

<body>

<div class="header">⚽ TENA SPORTS</div>

<div class="banner" id="tituloBanner">
🔥 HOY: Resultados deportivos EN VIVO
</div>

<div class="controls">
<input type="date" id="fechaInput">
<button class="buscar" onclick="buscarPorFecha()">Buscar</button>
</div>

<div id="matches"></div>

<div class="bottomnav">
<div class="navbtn active" onclick="modoLive(this)">🔴<br>En Vivo</div>
<div class="navbtn" onclick="modoTomorrow(this)">📅<br>Próximos</div>
<div class="navbtn" onclick="modoYesterday(this)">✅<br>Finalizados</div>
</div>

<script>

const API_KEY="46146fa668msh7fabe31efaaf8dep198920jsn3151b4847140";

let fechaManual=null;

function activarBoton(btn){
document.querySelectorAll(".navbtn").forEach(x=>x.classList.remove("active"));
btn.classList.add("active");
}

function hoy(){
return new Date().toISOString().split("T")[0];
}

function mañana(){
let d=new Date();
d.setDate(d.getDate()+1);
return d.toISOString().split("T")[0];
}

function ayer(){
let d=new Date();
d.setDate(d.getDate()-1);
return d.toISOString().split("T")[0];
}

async function cargar(endpoint){

const res=await fetch(endpoint,{
headers:{
"x-rapidapi-key":API_KEY,
"x-rapidapi-host":"livescore6.p.rapidapi.com"
}
});

const data=await res.json();

renderizar(data.data||[]);
}

function modoLive(btn){
activarBoton(btn);

fechaManual=null;

document.getElementById("tituloBanner").innerHTML=
"🔥 HOY: Resultados deportivos EN VIVO";

cargar("https://livescore6.p.rapidapi.com/api/livescore/v1/match/live");
}

function modoTomorrow(btn){
activarBoton(btn);

fechaManual=mañana();

document.getElementById("tituloBanner").innerHTML=
"📅 Próximos partidos";

cargar(`https://livescore6.p.rapidapi.com/api/livescore/v1/match/list?date=${fechaManual}`);
}

function modoYesterday(btn){
activarBoton(btn);

fechaManual=ayer();

document.getElementById("tituloBanner").innerHTML=
"✅ Partidos Finalizados";

cargar(`https://livescore6.p.rapidapi.com/api/livescore/v1/match/list?date=${fechaManual}`);
}

function buscarPorFecha(){

fechaManual=document.getElementById("fechaInput").value;

if(!fechaManual)return;

document.getElementById("tituloBanner").innerHTML=
"📆 Partidos del "+fechaManual;

cargar(`https://livescore6.p.rapidapi.com/api/livescore/v1/match/list?date=${fechaManual}`);
}

function renderizar(partidos){

let html="";

if(partidos.length===0){
html="<h2 style='padding:20px'>No hay partidos aquí</h2>";
document.getElementById("matches").innerHTML=html;
return;
}

let ligas={};

partidos.forEach(p=>{

let liga=p.league_name||"Sin liga";

if(!ligas[liga]) ligas[liga]=[];

ligas[liga].push(p);

});

for(let liga in ligas){

html+=`<div class="liga">🏆 ${liga}</div>`;

ligas[liga].forEach(p=>{

html+=`

<div class="card">

<div class="estado">
${p.status || "PARTIDO"}
</div>

<div>
${p.home_name}<br>
${p.away_name}
</div>

<div class="score">
${p.scores?.home ?? "-"} - ${p.scores?.away ?? "-"}
</div>

<div>
⏱ ${p.match_status?.live_time || p.match_date}
</div>

<button>Ver detalles</button>

</div>

`;

});

}

document.getElementById("matches").innerHTML=html;

}

modoLive();

</script>

</body>
</html>
