<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TENA SPORTS</title>

<style>
body{
margin:0;
background:#020b1c;
font-family:Arial;
color:white;
}

header{
background:linear-gradient(90deg,#13294d,#1f3d70);
padding:25px;
text-align:center;
font-size:42px;
font-weight:bold;
}

.banner{
background:red;
padding:15px;
text-align:center;
font-weight:bold;
font-size:22px;
}

#matches{
padding:20px;
}

.card{
background:#0d1a30;
padding:25px;
margin-bottom:20px;
border-radius:20px;
box-shadow:0 0 15px rgba(0,0,0,.4);
}

.live{
color:#00ff88;
font-weight:bold;
margin-bottom:10px;
font-size:20px;
}

.proximo{
color:#ffd700;
font-weight:bold;
margin-bottom:10px;
font-size:20px;
}

h2{
margin:0;
font-size:28px;
}

p{
font-size:20px;
}
</style>
</head>

<body>

<header>⚽ TENA SPORTS</header>

<div class="banner">
🔥 HOY: Resultados deportivos EN VIVO
</div>

<div id="matches"></div>

<script>

let html = "";

/* PARTIDOS EN VIVO */
html += `
<div class="card">
<div class="live">🔴 EN VIVO</div>
<h2>Real Madrid vs Barcelona</h2>
<p>⚽ 2 - 1</p>
</div>
`;

/* MÁS EN VIVO */
html += `
<div class="card">
<div class="live">🔴 EN VIVO</div>
<h2>Manchester City vs Arsenal</h2>
<p>⚽ 1 - 1</p>
</div>
`;

/* PRÓXIMOS */
html += `
<div class="card">
<div class="proximo">📅 PRÓXIMO</div>
<h2>PSG vs Bayern Munich</h2>
<p>⏰ 3:00 PM</p>
</div>
`;

html += `
<div class="card">
<div class="proximo">📅 PRÓXIMO</div>
<h2>Liverpool vs Chelsea</h2>
<p>⏰ 5:00 PM</p>
</div>
`;

document.getElementById("matches").innerHTML = html;

</script>

</body>
</html>
