<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tena Sports</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050b18;
color:white;
}

header{
background:linear-gradient(90deg,#111827,#1e293b);
padding:20px;
text-align:center;
font-size:32px;
font-weight:bold;
box-shadow:0 5px 20px rgba(0,0,0,0.5);
}

.menu{
display:flex;
overflow-x:auto;
gap:10px;
padding:15px;
background:#0f172a;
}

.menu button{
background:#1e293b;
border:none;
padding:12px 18px;
color:white;
border-radius:30px;
font-weight:bold;
min-width:100px;
cursor:pointer;
transition:0.3s;
}

.menu button.active{
background:#2563eb;
}

.container{
padding:20px;
}

.card{
background:#111827;
padding:20px;
margin-bottom:20px;
border-radius:20px;
box-shadow:0 8px 25px rgba(0,0,0,0.4);
}

.live{
color:#00ff88;
font-weight:bold;
margin-bottom:15px;
font-size:15px;
}

.teams{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.team{
display:flex;
align-items:center;
gap:10px;
font-size:20px;
font-weight:bold;
width:40%;
}

.team img{
width:35px;
height:35px;
object-fit:contain;
}

.score{
text-align:center;
font-size:32px;
font-weight:bold;
color:#3b82f6;
margin-bottom:10px;
}

.info{
text-align:center;
color:#9ca3af;
font-size:14px;
}
</style>

</head>
<body>

<header>
⚽ TENA SPORTS
</header>

<div class="menu">
<button onclick="filtrar('todos')" class="active">🔥 Todos</button>
<button onclick="filtrar('futbol')">⚽ Fútbol</button>
<button onclick="filtrar('mma')">🥊 MMA</button>
<button onclick="filtrar('tennis')">🎾 Tennis</button>
</div>

<div class="container">

<div class="card futbol">
<div class="live">🔴 EN VIVO</div>
<div class="teams">
<div class="team">
<img src="https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg">
Real Madrid
</div>
<div class="team" style="justify-content:flex-end;">
Barcelona
<img src="https://upload.wikimedia.org/wikipedia/en/4/47/FC_Barcelona_%28crest%29.svg">
</div>
</div>
<div class="score">2 - 1</div>
<div class="info">Minuto 78</div>
</div>

<div class="card tennis">
<div class="live">🔴 EN VIVO</div>
<div class="teams">
<div class="team">🎾 Djokovic</div>
<div class="team" style="justify-content:flex-end;">Nadal 🎾</div>
</div>
<div class="score">1 - 0</div>
<div class="info">Segundo Set</div>
</div>

<div class="card mma">
<div class="live">🔴 EN VIVO</div>
<div class="teams">
<div class="team">🥊 McGregor</div>
<div class="team" style="justify-content:flex-end;">Diaz 🥊</div>
</div>
<div class="score">Round 2</div>
<div class="info">UFC Main Event</div>
</div>

</div>

<script>
function filtrar(deporte){

let cards=document.querySelectorAll('.card');
let botones=document.querySelectorAll('.menu button');

botones.forEach(btn=>btn.classList.remove('active'));
event.target.classList.add('active');

cards.forEach(card=>{

if(deporte==="todos"){
card.style.display="block";
}
else if(card.classList.contains(deporte)){
card.style.display="block";
}
else{
card.style.display="none";
}

});

}
</script>

</body>
</html>
