<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TENA SPORTS</title>

<style>
body{
margin:0;
background:#021427;
font-family:Arial;
color:white;
padding-bottom:90px;
}

.header{
background:linear-gradient(90deg,#0057ff,#45b0ff);
padding:25px;
font-size:30px;
font-weight:bold;
text-align:center;
}

.banner{
background:red;
padding:20px;
font-size:22px;
font-weight:bold;
}

#matches{
padding:20px;
}

.card{
background:#3051a3;
padding:25px;
margin-bottom:20px;
border-radius:25px;
}

.team{
display:flex;
align-items:center;
gap:15px;
font-size:22px;
font-weight:bold;
margin:15px 0;
}

.team img{
width:40px;
height:40px;
}

.score{
font-size:55px;
font-weight:bold;
color:#00ff88;
margin:20px 0;
}

.bottom-menu{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#02213d;
padding:15px 0;
font-size:18px;
font-weight:bold;
}

.bottom-menu button{
background:none;
border:none;
color:white;
font-size:18px;
font-weight:bold;
}
</style>
</head>
<body>

<div class="header">⚽ TENA SPORTS</div>
<div class="banner">🔥 Resultados deportivos EN VIVO</div>

<div id="matches">Cargando...</div>

<div class="bottom-menu">
<button onclick="cargarEnVivo()">🔴<br>En Vivo</button>
<button onclick="cargarProximos()">📅<br>Próximos</button>
<button onclick="cargarFinalizados()">✅<br>Finalizados</button>
</div>

<script>

const API_KEY="3cc8bf02536b52d0ecc667afdfd2859c";

async function consultar(url){

const res=await fetch(url,{
method:"GET",
headers:{
"x-apisports-key":API_KEY
}
});

return await res.json();

}

function renderizar(data,tipo){

let html="";

if(!data.response || data.response.length===0){
document.getElementById("matches").innerHTML="<h2>No hay partidos disponibles</h2>";
return;
}

if(tipo==="proximo"){
data.response.sort((a,b)=>
new Date(a.fixture.date)-new Date(b.fixture.date)
);
}

data.response.forEach(partido=>{

let extra="";

if(tipo==="vivo"){
extra=`⏱ ${partido.fixture.status.elapsed}'`;
}

if(tipo==="proximo"){
extra=`📅 ${new Date(partido.fixture.date).toLocaleString("es-PE",{
timeZone:"America/Lima",
day:"2-digit",
month:"2-digit",
hour:"2-digit",
minute:"2-digit"
})}`;
}

if(tipo==="final"){
extra=`✅ Finalizado`;
}

html+=`

<div class="card">

<div class="team">
<img src="${partido.teams.home.logo}">
${partido.teams.home.name}
</div>

<div class="team">
<img src="${partido.teams.away.logo}">
${partido.teams.away.name}
</div>

<div class="score">
${partido.goals.home ?? "-"} - ${partido.goals.away ?? "-"}
</div>

<p>🏆 ${partido.league.name}</p>

<p>${extra}</p>

</div>

`;

});

document.getElementById("matches").innerHTML=html;

}

async function cargarEnVivo(){

document.getElementById("matches").innerHTML="Cargando en vivo...";

try{

const data=await consultar(
"https://v3.football.api-sports.io/fixtures?live=all"
);

renderizar(data,"vivo");

}catch{
document.getElementById("matches").innerHTML="Error cargando partidos";
}

}

async function cargarProximos(){

document.getElementById("matches").innerHTML="Cargando próximos...";

try{

const data=await consultar(
"https://v3.football.api-sports.io/fixtures?next=20"
);

renderizar(data,"proximo");

}catch{
document.getElementById("matches").innerHTML="Error cargando partidos";
}

}

async function cargarFinalizados(){

document.getElementById("matches").innerHTML="Cargando finalizados...";

try{

const data=await consultar(
"https://v3.football.api-sports.io/fixtures?last=20"
);

renderizar(data,"final");

}catch{
document.getElementById("matches").innerHTML="Error cargando partidos";
}

}

cargarEnVivo();

setInterval(()=>{
cargarEnVivo();
},60000);

</script>

</body>
</html>
