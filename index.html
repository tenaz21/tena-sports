<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TENA SPORTS</title>

<style>
body{
margin:0;
background:#021427;
font-family:Arial;
color:white;
}

.header{
background:linear-gradient(90deg,#005eff,#42b3ff);
padding:25px;
font-size:32px;
font-weight:bold;
text-align:center;
}

.banner{
background:red;
padding:20px;
font-size:24px;
font-weight:bold;
}

#matches{
padding:20px;
}

.card{
background:#26478d;
padding:20px;
margin-bottom:20px;
border-radius:20px;
}

.score{
font-size:40px;
font-weight:bold;
margin:15px 0;
color:#00ff88;
}
</style>
</head>
<body>

<div class="header">⚽ TENA SPORTS</div>
<div class="banner">🔥 HOY: Resultados deportivos EN VIVO</div>

<div id="matches">Cargando partidos...</div>

<script>

const API_KEY="3cc8bf02536b52d0ecc667afdfd2859c";

async function cargarPartidos(){

try{

const res = await fetch("https://v3.football.api-sports.io/fixtures?live=all",{
method:"GET",
headers:{
"x-apisports-key":API_KEY
}
});

const data = await res.json();

let html="";

if(data.response.length===0){
html="<h2>No hay partidos en vivo ahora mismo</h2>";
}else{

data.response.forEach(partido=>{

html+=`
<div class="card">

<h2>${partido.teams.home.name}</h2>

<h2>${partido.teams.away.name}</h2>

<div class="score">
${partido.goals.home} - ${partido.goals.away}
</div>

<p>⏱ Minuto: ${partido.fixture.status.elapsed || 0}'</p>

<p>🏆 ${partido.league.name}</p>

</div>
`;

});

}

document.getElementById("matches").innerHTML=html;

}catch(error){

document.getElementById("matches").innerHTML=
"<h2>Error cargando partidos</h2>";

}

}

cargarPartidos();

setInterval(cargarPartidos,60000);

</script>

</body>
</html>
