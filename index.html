<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TENA SPORTS</title>

<style>
body{
margin:0;
background:#021427;
font-family:Arial;
color:white;
padding-bottom:110px;
}

.header{
background:linear-gradient(90deg,#004dff,#35a7ff);
padding:25px;
font-size:32px;
font-weight:bold;
text-align:center;
}

.banner{
background:red;
padding:20px;
font-size:24px;
font-weight:bold;
}

.controls{
padding:15px;
background:#041a33;
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
}

.buscar{
padding:12px 20px;
background:#00aaff;
border:none;
border-radius:10px;
font-weight:bold;
color:white;
}

.liga{
background:#16325f;
padding:15px;
font-size:22px;
font-weight:bold;
}

.card{
background:#1d3f80;
margin:15px;
padding:20px;
border-radius:20px;
box-shadow:0 0 20px #00000050;
}

.estado{
font-size:26px;
font-weight:bold;
color:#00ff99;
margin-bottom:15px;
}

.score{
font-size:50px;
font-weight:bold;
margin:20px 0;
}

.detalles{
margin-top:15px;
padding:15px;
background:#00152f;
border-radius:15px;
display:none;
}

button{
width:100%;
padding:15px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
border:none;
border-radius:15px;
font-size:18px;
font-weight:bold;
color:white;
margin-top:15px;
}

.bottomnav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#00152d;
}

.navbtn{
flex:1;
padding:18px;
text-align:center;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.active{
color:#00bfff;
}
</style>
</head>
<body>

<div class="header">⚽ TENA SPORTS</div>

<div class="banner" id="tituloBanner">
🔥 HOY: Resultados deportivos EN VIVO
</div>

<div class="controls">
<input type="date" id="fechaInput">
<button class="buscar" onclick="buscarFecha()">Buscar</button>
</div>

<div id="matches"></div>

<div class="bottomnav">
<div class="navbtn active" onclick="verEnVivo(this)">🔴<br>En Vivo</div>
<div class="navbtn" onclick="verProximos(this)">📅<br>Próximos</div>
<div class="navbtn" onclick="verFinalizados(this)">✅<br>Finalizados</div>
</div>

<script>

const API_KEY="46146fa668msh7fabe31efaaf8dep198920jsn3151b4847140";

function activar(btn){
document.querySelectorAll(".navbtn").forEach(x=>x.classList.remove("active"));
btn.classList.add("active");
}

function formatoFecha(offset=0){
let d=new Date();
d.setDate(d.getDate()+offset);
return d.toISOString().split("T")[0];
}

async function obtenerPartidos(fecha=null,enVivo=false){

let url="";

if(enVivo){
url="https://livescore67.p.rapidapi.com/api/livescore/v1/match/live?sport_id=football";
}else{
url=`https://livescore67.p.rapidapi.com/api/livescore/v1/match/list?sport_id=football&date=${fecha}`;
}

const res=await fetch(url,{
method:"GET",
headers:{
"x-rapidapi-key":API_KEY,
"x-rapidapi-host":"livescore67.p.rapidapi.com"
}
});

const data=await res.json();

renderizar(data);

}

async function verEnVivo(btn){
activar(btn);

document.getElementById("tituloBanner").innerHTML=
"🔥 HOY: Resultados deportivos EN VIVO";

obtenerPartidos(null,true);
}

async function verProximos(btn){
activar(btn);

document.getElementById("tituloBanner").innerHTML=
"📅 Próximos partidos";

obtenerPartidos(formatoFecha(1));
}

async function verFinalizados(btn){
activar(btn);

document.getElementById("tituloBanner").innerHTML=
"✅ Partidos Finalizados";

obtenerPartidos(formatoFecha(-1));
}

async function buscarFecha(){

let fecha=document.getElementById("fechaInput").value;

if(!fecha)return;

document.getElementById("tituloBanner").innerHTML=
"📆 Partidos del "+fecha;

obtenerPartidos(fecha);
}

function toggleDetalles(id){
let box=document.getElementById(id);

box.style.display=
box.style.display==="block"?"none":"block";
}

function renderizar(data){

let html="";

if(!data || data.length===0){
document.getElementById("matches").innerHTML="<h2 style='padding:20px'>No hay partidos disponibles</h2>";
return;
}

let contador=0;

data.forEach(liga=>{

if(!liga.matches || liga.matches.length===0)return;

html+=`<div class="liga">🏆 ${liga.stage.stage_name}</div>`;

liga.matches.forEach(partido=>{

contador++;

html+=`
<div class="card">

<div class="estado">
${partido.status || "PARTIDO"}
</div>

<div style="font-size:20px;">
${partido.team_home[0].team_name}<br><br>
${partido.team_away[0].team_name}
</div>

<div class="score">
${partido.scores?.home ?? "-"} - ${partido.scores?.away ?? "-"}
</div>

<div>
⏱ ${partido.match_status?.live_time || partido.match_date || ""}
</div>

<button onclick="toggleDetalles('det${contador}')">
Ver detalles
</button>

<div class="detalles" id="det${contador}">
📅 Fecha: ${partido.match_date || "No disponible"}<br><br>
🏆 Liga: ${liga.stage.stage_name}<br><br>
🌍 País: ${liga.country.country_name}<br>
</div>

</div>
`;

});

});

document.getElementById("matches").innerHTML=html;
}

verEnVivo();

</script>

</body>
</html>
