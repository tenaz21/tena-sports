<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TENA SPORTS</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#021427;
color:white;
padding-bottom:120px;
}

.header{
background:linear-gradient(90deg,#004cff,#39a9ff);
padding:25px;
font-size:32px;
font-weight:bold;
text-align:center;
}

.banner{
background:red;
padding:20px;
font-size:24px;
font-weight:bold;
}

.refreshBtn{
margin:15px;
width:calc(100% - 30px);
padding:15px;
background:#00b050;
border:none;
border-radius:15px;
color:white;
font-size:20px;
font-weight:bold;
}

.controls{
display:flex;
gap:10px;
padding:15px;
}

input{
flex:1;
padding:15px;
border:none;
border-radius:15px;
font-size:18px;
}

.buscar{
padding:15px 20px;
background:#13aaf2;
border:none;
border-radius:15px;
color:white;
font-size:20px;
font-weight:bold;
}

.liga{
background:#19386b;
padding:15px;
font-size:22px;
font-weight:bold;
margin-top:10px;
}

.card{
background:#26478d;
margin:15px;
padding:25px;
border-radius:20px;
}

.estado{
font-size:26px;
font-weight:bold;
margin-bottom:20px;
}

.score{
font-size:60px;
font-weight:bold;
margin:20px 0;
}

.detBtn{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:15px;
background:linear-gradient(90deg,#14c9f5,#007bff);
color:white;
font-size:20px;
font-weight:bold;
}

.detalles{
display:none;
margin-top:15px;
padding:20px;
background:#00142e;
border-radius:15px;
line-height:1.8;
}

.bottomnav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#00152d;
}

.navbtn{
flex:1;
padding:20px;
text-align:center;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.active{
color:#00bfff;
}

.livePulse{
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{opacity:1;}
50%{opacity:.4;}
100%{opacity:1;}
}
</style>

</head>
<body>

<div class="header">⚽ TENA SPORTS</div>

<div class="banner" id="tituloBanner">
🔥 HOY: Resultados deportivos EN VIVO
</div>

<button class="refreshBtn" onclick="recargarTodo()">
🔄 Actualizar partidos
</button>

<div class="controls">
<input type="date" id="fechaInput">
<button class="buscar" onclick="buscarFecha()">Buscar</button>
</div>

<div id="matches"></div>

<div class="bottomnav">
<div class="navbtn active" onclick="verEnVivo(this)">🔴<br>En Vivo</div>
<div class="navbtn" onclick="verProximos(this)">📅<br>Próximos</div>
<div class="navbtn" onclick="verFinalizados(this)">✅<br>Finalizados</div>
</div>

<script>

const API_KEY="46146fa668msh7fabe31efaaf8dep198920jsn3151b4847140";
let modoActual="live";

function activar(btn){
document.querySelectorAll(".navbtn").forEach(x=>x.classList.remove("active"));
btn.classList.add("active");
}

function fechaOffset(dias){
let d=new Date();
d.setDate(d.getDate()+dias);
return d.toISOString().split("T")[0];
}

function formatearFecha(fecha){
return new Date(fecha).toLocaleString("es-PE",{
timeZone:"America/Lima",
day:"numeric",
month:"short",
hour:"numeric",
minute:"2-digit",
hour12:true
});
}

function tiempoRestante(fecha){
let ahora=new Date();
let partido=new Date(fecha);
let diff=partido-ahora;
let horas=Math.floor(diff/1000/60/60);

return "⏳ Faltan "+horas+" horas";
}

function toggleDetalles(id){
let box=document.getElementById(id);
box.style.display=box.style.display==="block"?"none":"block";
}

async function obtener(fecha,enVivo=false){

let url="";

if(enVivo){

url="https://livescore67.p.rapidapi.com/api/livescore/v1/match/live?sport_id=football";

}else{

url=`https://livescore67.p.rapidapi.com/api/livescore/v1/match/list?sport_id=football&date=${fecha}`;

}

const res=await fetch(url,{
headers:{
"x-rapidapi-key":API_KEY,
"x-rapidapi-host":"livescore67.p.rapidapi.com"
}
});

const data=await res.json();

render(data);

}

function render(data){

let html="";
let c=0;
let partidosEncontrados=0;

if(!data?.length){
document.getElementById("matches").innerHTML="<h2 style='padding:20px'>No hay partidos aquí</h2>";
return;
}

data.forEach(liga=>{

let partidosFiltrados=[];

liga.matches?.forEach(p=>{

let status=(p.match_status?.status||"").toUpperCase();

if(modoActual==="live"){
if(status.includes("LIVE")||status.includes("1H")||status.includes("2H")||status.includes("HT")){
partidosFiltrados.push(p);
}
}

if(modoActual==="next"){
if(status==="NS"||status==="NOT STARTED"){
partidosFiltrados.push(p);
}
}

if(modoActual==="finished"){
if(status==="FT"||status.includes("FINISHED")){
partidosFiltrados.push(p);
}
}

});

if(!partidosFiltrados.length)return;

partidosEncontrados++;

html+=`
<div class="liga">
🏆 ${liga.stage.stage_name} (${partidosFiltrados.length})
</div>
`;

partidosFiltrados.forEach(p=>{

c++;

let home=p.team_home?.[0]?.team_name||"-";
let away=p.team_away?.[0]?.team_name||"-";

let hs=p.scores?.home??"-";
let as=p.scores?.away??"-";

let estado="";
let glow="";

if(modoActual==="live"){
estado="<span class='livePulse'>🔴 EN VIVO</span>";
glow="box-shadow:0 0 25px #00ff99;";
}

if(modoActual==="next"){
estado="📅 PRÓXIMO";
hs="-";
as="-";
}

if(modoActual==="finished"){
estado="✅ FINALIZADO";
}

html+=`

<div class="card" style="${glow}">
<div class="estado">${estado}</div>

<div style="${hs>as?"color:#00ff88;font-weight:bold":""}">
${home}
</div><br>

<div style="${as>hs?"color:#00ff88;font-weight:bold":""}">
${away}
</div>

<div class="score">
${hs} - ${as}
</div>

<div>
⏱ ${
modoActual==="live"
? p.match_status?.live_time||"En juego"
: formatearFecha(p.match_date)
}
</div>

${modoActual==="next"?"<br>"+tiempoRestante(p.match_date):""}

<button class="detBtn" onclick="toggleDetalles('det"+c+"')">
Ver detalles
</button>

<div class="detalles" id="det${c}">
📅 Fecha: ${formatearFecha(p.match_date)}<br>
🏆 Liga: ${liga.stage.stage_name}<br>
🌍 País: ${liga.country.country_name}
</div>

</div>

`;

});

});

if(partidosEncontrados===0){
html="<h2 style='padding:20px'>No hay partidos aquí</h2>";
}

document.getElementById("matches").innerHTML=html;

}

function verEnVivo(btn){
modoActual="live";
activar(btn);
document.getElementById("tituloBanner").innerHTML="🔥 HOY: Resultados deportivos EN VIVO";
obtener(null,true);
}

function verProximos(btn){
modoActual="next";
activar(btn);
document.getElementById("tituloBanner").innerHTML="📅 Próximos partidos";
obtener(fechaOffset(1));
}

function verFinalizados(btn){
modoActual="finished";
activar(btn);
document.getElementById("tituloBanner").innerHTML="✅ Partidos Finalizados";
obtener(fechaOffset(-1));
}

function buscarFecha(){
let fecha=document.getElementById("fechaInput").value;
if(!fecha)return;

document.getElementById("tituloBanner").innerHTML="📆 Partidos del "+fecha;
obtener(fecha);
}

function recargarTodo(){

if(modoActual==="live") obtener(null,true);
if(modoActual==="next") obtener(fechaOffset(1));
if(modoActual==="finished") obtener(fechaOffset(-1));

}

setInterval(()=>{
if(modoActual==="live"){
recargarTodo();
}
},30000);

verEnVivo();

</script>

</body>
</html>
