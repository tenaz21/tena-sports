<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TENA SPORTS</title>

<style>
body{
margin:0;
background:#020b1c;
font-family:Arial;
color:white;
}

header{
background:linear-gradient(90deg,#13294d,#1f3d70);
padding:25px;
text-align:center;
font-size:42px;
font-weight:bold;
}

.banner{
background:red;
padding:15px;
text-align:center;
font-weight:bold;
font-size:22px;
}

#matches{
padding:20px;
}

.card{
background:#0d1a30;
padding:25px;
margin-bottom:25px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,.5);
transition:.3s;
}

.card:hover{
transform:scale(1.03);
}

.live{
color:#00ff88;
font-weight:bold;
font-size:22px;
margin-bottom:15px;
display:flex;
align-items:center;
}

.live::before{
content:"";
width:15px;
height:15px;
background:red;
border-radius:50%;
display:inline-block;
margin-right:10px;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.3);opacity:.5;}
100%{transform:scale(1);}
}

.proximo{
color:gold;
font-weight:bold;
font-size:22px;
margin-bottom:15px;
}

.team{
display:flex;
align-items:center;
margin-bottom:15px;
font-size:28px;
font-weight:bold;
}

.team img{
width:45px;
margin-right:15px;
}

.score{
font-size:35px;
color:#2f7cff;
font-weight:bold;
margin-top:15px;
}

.time{
font-size:28px;
color:#ccc;
}
</style>
</head>

<body>

<header>⚽ TENA SPORTS</header>

<div class="banner">
🔥 HOY: Resultados deportivos EN VIVO
</div>

<div id="matches"></div>

<script>

let html="";

html+=`
<div class="card">

<div class="live">EN VIVO</div>

<div class="team">
<img src="https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg">
Real Madrid
</div>

<div class="team">
<img src="https://upload.wikimedia.org/wikipedia/en/4/47/FC_Barcelona_%28crest%29.svg">
Barcelona
</div>

<div class="score">⚽ 2 - 1</div>

</div>
`;

html+=`
<div class="card">

<div class="live">EN VIVO</div>

<div class="team">
<img src="https://upload.wikimedia.org/wikipedia/en/e/eb/Manchester_City_FC_badge.svg">
Manchester City
</div>

<div class="team">
<img src="https://upload.wikimedia.org/wikipedia/en/5/53/Arsenal_FC.svg">
Arsenal
</div>

<div class="score">⚽ 1 - 1</div>

</div>
`;

html+=`
<div class="card">

<div class="proximo">📅 PRÓXIMO</div>

<div class="team">
<img src="https://upload.wikimedia.org/wikipedia/en/a/a7/Paris_Saint-Germain_F.C..svg">
PSG
</div>

<div class="team">
<img src="https://upload.wikimedia.org/wikipedia/commons/1/1f/FC_Bayern_München_logo_%282024%29.svg">
Bayern Munich
</div>

<div class="time">⏰ 3:00 PM</div>

</div>
`;

html+=`
<div class="card">

<div class="proximo">📅 PRÓXIMO</div>

<div class="team">
<img src="https://upload.wikimedia.org/wikipedia/en/0/0c/Liverpool_FC.svg">
Liverpool
</div>

<div class="team">
<img src="https://upload.wikimedia.org/wikipedia/en/c/cc/Chelsea_FC.svg">
Chelsea
</div>

<div class="time">⏰ 5:00 PM</div>

</div>
`;

document.getElementById("matches").innerHTML=html;

</script>

</body>
</html>
