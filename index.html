<script>
async function cargarPartidos(){
try{
const response = await fetch("https://livescore6.p.rapidapi.com/matches/v2/list-live?Category=soccer&Timezone=-5",{
method:"GET",
headers:{
'X-RapidAPI-Key':'46146fa668msh7fabe31efaaf8dep198920jsn3151b4847140',
'X-RapidAPI-Host':'livescore6.p.rapidapi.com'
}
});

const data = await response.json();

console.log(data);

const matchesDiv=document.getElementById("matches");
matchesDiv.innerHTML="";

if(!data.Stages || data.Stages.length===0){
matchesDiv.innerHTML="<h2>No hay partidos en vivo ahora mismo</h2>";
return;
}

data.Stages.forEach(stage=>{
stage.Events.forEach(match=>{
matchesDiv.innerHTML += `
<div class="card">
<div class="live">🔴 EN VIVO</div>

<div class="match">
<span>${match.T1[0].Nm}</span>
<span>${match.T2[0].Nm}</span>
</div>

<div class="score">
${match.Tr1} - ${match.Tr2}
</div>

<div class="minute">
${match.Eps}
</div>
</div>
`;
});
});

}catch(error){
document.getElementById("matches").innerHTML="<h2>Error cargando partidos</h2>";
console.log(error);
}
}

cargarPartidos();
setInterval(cargarPartidos,60000);
</script>
