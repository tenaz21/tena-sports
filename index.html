<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TENA SPORTS</title>

<style>
body{
margin:0;
background:#03152f;
font-family:Arial;
color:white;
}

header{
background:linear-gradient(90deg,#0d47ff,#2e7dff);
padding:20px;
font-size:35px;
font-weight:bold;
text-align:center;
}

.banner{
background:red;
padding:20px;
font-size:25px;
font-weight:bold;
}

.liga{
background:#112a55;
padding:15px;
font-size:22px;
font-weight:bold;
}

.card{
background:#15336d;
margin:20px;
padding:25px;
border-radius:25px;
}

.estado{
font-size:28px;
font-weight:bold;
color:#00ff84;
}

.equipos{
font-size:24px;
line-height:1.6;
margin:20px 0;
}

.score{
font-size:60px;
font-weight:bold;
}

.minute{
font-size:30px;
color:#00ff84;
margin-top:15px;
}

button{
width:100%;
padding:18px;
margin-top:20px;
border:none;
border-radius:15px;
font-size:24px;
font-weight:bold;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
}

.detalles{
display:none;
margin-top:20px;
padding:20px;
background:#031126;
border-radius:15px;
font-size:18px;
line-height:1.7;
}
</style>
</head>
<body>

<header>⚽ TENA SPORTS</header>

<div class="banner">
🔥 HOY: Resultados deportivos EN VIVO
</div>

<div id="matches"></div>

<script>

const apiKey="46146fa668msh7fabe31efaaf8dep198920jsn3151b4847140";

async function cargarPartidos(){

const res=await fetch(
"https://livescore67.p.rapidapi.com/api/livescore/v1/match/live?sport_id=football",
{
method:"GET",
headers:{
"x-rapidapi-key":apiKey,
"x-rapidapi-host":"livescore67.p.rapidapi.com"
}
});

const data=await res.json();

let html="";

data.forEach(liga=>{

html+=`
<div class="liga">
🏆 ${liga.stage.stage_name}
</div>
`;

liga.matches.forEach(partido=>{

html+=`
<div class="card">

<div class="estado">
🔴 EN VIVO
</div>

<div class="equipos">
${partido.team_home[0].team_name}<br>
${partido.team_away[0].team_name}
</div>

<div class="score">
${partido.scores.home} - ${partido.scores.away}
</div>

<div class="minute">
⏱ ${partido.match_status.live_time}'
</div>

<button onclick="toggleDetalles('${partido.match_id}')">
Ver detalles
</button>

<div class="detalles" id="detalle-${partido.match_id}">
📅 Fecha: ${partido.match_date || "No disponible"}<br>
🏆 Liga: ${liga.stage.stage_name}<br>
🌍 País: ${liga.country.country_name}<br>
🔄 Estado: ${partido.match_status.is_in_progress ? "En juego" : "Detenido"}<br>
⏱ Minuto actual: ${partido.match_status.live_time}'<br>
🥅 Marcador HT: ${partido.scores.home_1halftime || 0} - ${partido.scores.away_1halftime || 0}
</div>

</div>
`;

});

});

document.getElementById("matches").innerHTML=html;

}

function toggleDetalles(id){

let box=document.getElementById("detalle-"+id);

if(box.style.display==="block"){
box.style.display="none";
}else{
box.style.display="block";
}

}

cargarPartidos();

setInterval(cargarPartidos,10000);

</script>

</body>
</html>
