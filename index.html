<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TENA SPORTS</title>

<style>
body{
margin:0;
background:#02122b;
font-family:Arial;
color:white;
}

header{
background:#1d4fff;
padding:25px;
font-size:35px;
font-weight:bold;
text-align:center;
}

.banner{
background:red;
padding:20px;
font-size:22px;
font-weight:bold;
}

.liga{
background:#132850;
padding:15px;
font-size:22px;
font-weight:bold;
}

.card{
background:#10295a;
margin:20px;
padding:25px;
border-radius:25px;
}

.estado{
font-size:28px;
font-weight:bold;
color:#00ff88;
}

.equipos{
font-size:24px;
margin:20px 0;
}

.score{
font-size:55px;
font-weight:bold;
}

.minute{
font-size:28px;
color:#00ff88;
margin-top:15px;
}

button{
width:100%;
padding:18px;
margin-top:20px;
border:none;
border-radius:15px;
background:#2f68ff;
font-size:22px;
color:white;
font-weight:bold;
}

.detalles{
display:none;
margin-top:20px;
padding:20px;
background:#021633;
border-radius:15px;
font-size:14px;
white-space:pre-wrap;
color:#00ff88;
}
</style>

</head>
<body>

<header>⚽ TENA SPORTS</header>

<div class="banner">
🔥 HOY: Resultados deportivos EN VIVO
</div>

<div id="matches"></div>

<script>

const apiKey="46146fa668msh7fabe31efaaf8dep198920jsn3151b4847140";

async function cargarPartidos(){

const res=await fetch(
"https://livescore67.p.rapidapi.com/api/livescore/v1/match/live?sport_id=football",
{
method:"GET",
headers:{
"x-rapidapi-key":apiKey,
"x-rapidapi-host":"livescore67.p.rapidapi.com"
}
});

const data=await res.json();

let html="";

data.forEach(liga=>{

html+=`<div class="liga">🏆 ${liga.stage.stage_name}</div>`;

liga.matches.forEach(partido=>{

html+=`
<div class="card">

<div class="estado">🔴 EN VIVO</div>

<div class="equipos">
${partido.team_home[0].team_name}<br>
${partido.team_away[0].team_name}
</div>

<div class="score">
${partido.scores.home} - ${partido.scores.away}
</div>

<div class="minute">
⏱ ${partido.match_status.live_time}'
</div>

<button onclick="verDetalles('${partido.match_id}')">
Ver detalles
</button>

<div class="detalles" id="detalle-${partido.match_id}">
</div>

</div>
`;

});

});

document.getElementById("matches").innerHTML=html;

}

async function verDetalles(matchId){

let box=document.getElementById("detalle-"+matchId);

if(box.style.display==="block"){
box.style.display="none";
return;
}

box.style.display="block";
box.innerHTML="Cargando...";

const res=await fetch(
`https://livescore67.p.rapidapi.com/api/livescore/v1/match/summary?match_id=${matchId}`,
{
method:"GET",
headers:{
"x-rapidapi-key":apiKey,
"x-rapidapi-host":"livescore67.p.rapidapi.com"
}
});

const data=await res.json();

box.innerHTML=`
${JSON.stringify(data,null,2)}
`;

}

cargarPartidos();

setInterval(cargarPartidos,10000);

</script>

</body>
</html>
